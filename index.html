<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Tanite Price Calculator</title>
    </head>
    <body>
        <main>
            <div class="calculator">
               <h2>Fruit Market 🍎</h2>
  
               <input type="text" id="fruitInput" placeholder="Enter fruit (e.g. Apple)">
               <input type="number" id="qtyInput" placeholder="Quantity" min="1">
  
               <button id="calcBtn">Calculate Total</button>
  
               <p id="receipt" style="font-weight: bold; margin-top: 15px;"></p>
            </div>
        </main>
    </body>
    <script src="script.js"></script>
</html>
